<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心灵树洞 - 分享你的故事</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js"></script>

</head>
<body>
    <header>
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1 class="logo">心灵树洞</h1>
                    <p class="slogan">在这里，你可以倾诉一切</p>
                </div>
                <div class="user-section">
                    <div id="user-info" style="display: none; align-items: center; gap: 10px;">
                        <img id="user-avatar" src="" alt="头像" class="user-avatar">
                        <span id="user-name"></span>
                        <button id="friends-btn" class="upload-btn" style="padding: 5px 10px;">好友</button>
                        <button id="settings-btn" class="upload-btn" style="padding: 5px 10px;">设置</button>
                        <button id="logout-btn" class="upload-btn" style="padding: 5px 10px;">退出</button>
                    </div>
                    <div id="login-section">
                        <button id="login-btn" class="upload-btn" style="padding: 8px 15px;">登录/注册</button>
                    </div>
                </div>
            </div>
            <div style="margin-top: 15px; padding: 10px; background-color: #f0f8ff; border-radius: 5px; font-size: 0.9rem; color: #333;">
                <i class="fas fa-info-circle"></i> <strong>数据共享说明：</strong>由于使用浏览器本地存储，不同设备/浏览器之间的数据不自动共享。你可以使用导出/导入功能手动共享数据。
            </div>
        </div>
    </header>

    <!-- 登录/注册模态框 -->
    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">登录</h3>
                <span class="close-btn">&times;</span>
            </div>
            <div class="modal-body">
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchAuthTab('login')">登录</button>
                    <button class="auth-tab" onclick="switchAuthTab('register')">注册</button>
                </div>
                
                <!-- 登录表单 -->
                <div id="login-form" class="auth-form">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="login-username" placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="login-password" placeholder="请输入密码">
                    </div>
                    <button id="submit-login" class="auth-btn">登录</button>
                </div>
                
                <!-- 注册表单 -->
                <div id="register-form" class="auth-form" style="display: none;">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="register-username" placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="register-password" placeholder="请输入密码">
                    </div>
                    <div class="form-group">
                        <label>确认密码</label>
                        <input type="password" id="register-confirm-password" placeholder="请确认密码">
                    </div>
                    <button id="submit-register" class="auth-btn">注册</button>
                </div>
                
                <!-- 第三方登录 -->
                <div class="third-party-login">
                    <p>其他登录方式</p>
                    <div class="login-buttons">
                        <button class="third-party-btn wechat-btn" onclick="loginWithWechat()">
                            <i class="fab fa-weixin"></i> 微信登录
                        </button>
                        <button class="third-party-btn qq-btn" onclick="loginWithQQ()">
                            <i class="fab fa-qq"></i> QQ登录
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 个人设置模态框 -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>个人设置</h3>
                <span class="close-btn">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>头像</label>
                    <div class="avatar-upload">
                        <img id="settings-avatar" src="" alt="头像" class="user-avatar" style="margin-bottom: 10px;">
                        <input type="file" id="avatar-upload" accept="image/*">
                        <label for="avatar-upload" class="upload-btn" style="display: block; text-align: center; margin-top: 10px;">
                            <i class="fas fa-upload"></i> 更换头像
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="settings-username" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>用户ID</label>
                    <input type="text" id="settings-user-id" placeholder="用户ID" readonly>
                </div>
                <button id="save-settings" class="auth-btn">保存设置</button>
            </div>
        </div>
    </div>

    <!-- 好友模态框 -->
    <div id="friends-modal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3>好友</h3>
                <span class="close-btn">&times;</span>
            </div>
            <div class="modal-body">
                <div class="friends-tabs">
                    <button class="friends-tab active" onclick="switchFriendsTab('list')">好友列表</button>
                    <button class="friends-tab" onclick="switchFriendsTab('add')">添加好友</button>
                    <button class="friends-tab" onclick="switchFriendsTab('chat')">聊天</button>
                </div>
                
                <!-- 好友列表 -->
                <div id="friends-list" class="friends-content">
                    <div class="form-group" style="margin-bottom: 15px;">
                        <input type="text" id="friend-search" placeholder="搜索好友...">
                    </div>
                    <div id="friends-container">
                        <!-- 好友列表将在这里显示 -->
                    </div>
                </div>
                
                <!-- 添加好友 -->
                <div id="add-friends" class="friends-content" style="display: none;">
                    <div class="form-group">
                        <label>用户名或用户ID</label>
                        <input type="text" id="add-friend-username" placeholder="请输入好友用户名或用户ID">
                    </div>
                    <button id="add-friend-btn" class="auth-btn">添加好友</button>
                </div>
                
                <!-- 聊天 -->
                <div id="chat" class="friends-content" style="display: none;">
                    <div class="chat-container">
                        <div class="chat-sidebar">
                            <div id="chat-friends-list">
                                <!-- 好友列表将在这里显示 -->
                            </div>
                        </div>
                        <div class="chat-main">
                            <div class="chat-header">
                                <h4 id="chat-friend-name">选择好友开始聊天</h4>
                            </div>
                            <div id="chat-messages" class="chat-messages">
                                <!-- 聊天消息将在这里显示 -->
                            </div>
                            <div class="chat-input-area">
                                <input type="text" id="chat-input" placeholder="输入消息...">
                                <button id="send-message-btn" class="chat-send-btn">发送</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <main>
        <div class="container">
            <!-- 发布区域 -->
            <section class="post-section">
                <div class="post-card">
                    <div class="post-header">
                        <h2>分享你的故事</h2>
                    </div>
                    <div class="post-content">
                        <textarea id="post-text" placeholder="在这里写下你的想法..."></textarea>
                        <div class="post-actions">
                            <div class="file-upload">
                                <label for="image-upload" class="upload-btn">
                                    <i class="fas fa-image"></i> 图片
                                </label>
                                <input type="file" id="image-upload" accept="image/*" style="display: none;">
                            </div>
                            <div class="file-upload">
                                <label for="video-upload" class="upload-btn">
                                    <i class="fas fa-video"></i> 视频
                                </label>
                                <input type="file" id="video-upload" accept="video/*" style="display: none;">
                            </div>
                            <div class="file-upload">
                                <button id="voice-record" class="upload-btn">
                                    <i class="fas fa-microphone"></i> 语音
                                </button>
                            </div>
                            <button id="post-button" class="post-btn">发布</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 排行榜区域 -->
            <section class="content-section">
                <h2>排行榜</h2>
                <div class="ranking-tabs">
                    <button class="ranking-tab active" onclick="showRanking('likes')">点赞榜</button>
                    <button class="ranking-tab" onclick="showRanking('views')">浏览榜</button>
                    <button class="ranking-tab" onclick="showRanking('comments')">评论榜</button>
                </div>
                <div id="ranking-container" class="posts-grid">
                    <!-- 排行榜内容将在这里显示 -->
                </div>
            </section>

            <!-- 内容展示区域 -->
            <section class="content-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>最新分享</h2>
                    <div style="display: flex; gap: 10px;">
                        <button onclick="exportData()" class="upload-btn" style="padding: 8px 15px;">
                            <i class="fas fa-download"></i> 导出
                        </button>
                        <label for="import-file" class="upload-btn" style="padding: 8px 15px; cursor: pointer;">
                            <i class="fas fa-upload"></i> 导入
                        </label>
                        <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importData(event)">
                    </div>
                </div>
                <div id="posts-container" class="posts-grid">
                    <!-- 动态生成的帖子将显示在这里 -->
                </div>
            </section>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 心灵树洞 | 在这里，你可以自由表达</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>

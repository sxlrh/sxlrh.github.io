<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="心灵树洞 - 一个温暖的分享平台，在这里你可以倾诉一切">
    <meta name="keywords" content="心灵树洞,分享,社交,倾诉">
    <meta property="og:title" content="心灵树洞 - 分享你的故事">
    <meta property="og:description" content="在这里，你可以倾诉一切">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#667eea">
    <title>心灵树洞 - 分享你的故事</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- PWA 支持 -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <!-- 加载遮罩 -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">加载中...</div>
    </div>

    <!-- 夜间模式切换按钮 -->
    <button class="theme-toggle" id="theme-toggle" title="切换主题">
        <i class="fas fa-moon"></i>
    </button>

    <header>
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1 class="logo">心灵树洞</h1>
                    <p class="slogan">在这里，你可以倾诉一切</p>
                </div>
                <div style="display:flex;align-items:center;gap:10px;">
                    <input type="text" id="global-search" placeholder="搜索话题/用户..." 
                           style="padding:8px 15px;border:1px solid #e0e0e0;border-radius:20px;font-size:0.85rem;width:180px;"
                           onkeypress="if(event.key==='Enter'){globalSearch()}">
                    <div class="user-section">
                    <div id="user-info" style="display: none; align-items: center; gap: 8px;">
                        <img id="user-avatar" src="" alt="头像" class="user-avatar" style="width:32px;height:32px;">
                        <span id="user-name" style="font-size:0.9rem;"></span>
                        <button id="notification-btn" class="upload-btn" style="padding: 4px 8px;font-size:0.8rem;position:relative;" title="通知">
                            <i class="fas fa-bell"></i><span id="notification-badge" style="display:none;position:absolute;top:-5px;right:-5px;background:red;color:white;font-size:0.6rem;padding:2px 5px;border-radius:10px;">0</span>
                        </button>
                        <button id="friends-btn" class="upload-btn" style="padding: 4px 8px;font-size:0.8rem;">好友</button>
                        <button id="settings-btn" class="upload-btn" style="padding: 4px 8px;font-size:0.8rem;">设置</button>
                        <button id="logout-btn" class="upload-btn" style="padding: 3px 6px;font-size:0.75rem;color:#999;margin-left:5px;" title="退出登录">退出</button>
                    </div>
                    <div id="login-section">
                        <button id="login-btn" class="upload-btn" style="padding: 8px 15px;">登录/注册</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 登录/注册模态框 -->
    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">登录</h3>
                <span class="close-btn">&times;</span>
            </div>
            <div class="modal-body">
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchAuthTab('login')">登录</button>
                    <button class="auth-tab" onclick="switchAuthTab('register')">注册</button>
                </div>
                
                <!-- 登录表单 -->
                <div id="login-form" class="auth-form">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="login-username" placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="login-password" placeholder="请输入密码">
                    </div>
                    <button id="submit-login" class="auth-btn">登录</button>
                </div>
                
                <!-- 注册表单 -->
                <div id="register-form" class="auth-form" style="display: none;">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="register-username" placeholder="请输入用户名（2-20字符）">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="register-password" placeholder="请输入密码（至少6位）">
                    </div>
                    <div class="form-group">
                        <label>确认密码</label>
                        <input type="password" id="register-confirm-password" placeholder="请确认密码">
                    </div>
                    <button id="submit-register" class="auth-btn">注册</button>
                </div>
                
                <!-- 第三方登录 -->
                <div class="third-party-login">
                    <p>快速登录</p>
                    <div class="login-buttons">
                        <button class="third-party-btn wechat-btn" onclick="loginWithWechat()">
                            <i class="fab fa-weixin"></i> 微信登录
                        </button>
                        <button class="third-party-btn qq-btn" onclick="loginWithQQ()">
                            <i class="fab fa-qq"></i> QQ登录
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 个人设置模态框 -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>个人设置</h3>
                <span class="close-btn">&times;</span>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>头像</label>
                    <div class="avatar-upload">
                        <img id="settings-avatar" src="" alt="头像" class="user-avatar" style="margin-bottom: 10px;">
                        <input type="file" id="avatar-upload" accept="image/*">
                        <label for="avatar-upload" class="upload-btn" style="display: block; text-align: center; margin-top: 10px;">
                            <i class="fas fa-upload"></i> 更换头像
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="settings-username" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>用户ID</label>
                    <input type="text" id="settings-user-id" placeholder="用户ID" readonly>
                </div>
                <button id="save-settings" class="auth-btn">保存设置</button>
            </div>
        </div>
    </div>

    <!-- 通知模态框 -->
    <div id="notification-modal" class="modal">
        <div class="modal-content" style="max-width: 450px;">
            <div class="modal-header">
                <h3>通知</h3>
                <span class="close-btn" onclick="closeNotificationModal()">&times;</span>
            </div>
            <div class="modal-body" id="notification-list" style="max-height:400px;overflow-y:auto;">
                <p style="text-align:center;color:#999;padding:20px;">暂无通知</p>
            </div>
        </div>
    </div>

    <!-- 用户主页模态框 -->
    <div id="user-profile-modal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h3 id="profile-username">用户主页</h3>
                <span class="close-btn" onclick="closeUserProfile()">&times;</span>
            </div>
            <div class="modal-body">
                <div id="profile-info" style="text-align:center;padding:20px 0;">
                    <img id="profile-avatar" src="" style="width:80px;height:80px;border-radius:50%;border:3px solid #667eea;margin-bottom:15px;">
                    <div id="profile-name" style="font-size:1.3rem;font-weight:bold;color:#333;margin-bottom:5px;"></div>
                    <div id="profile-id" style="color:#999;font-size:0.85rem;margin-bottom:15px;"></div>
                    <div id="profile-stats" style="display:flex;justify-content:center;gap:30px;color:#666;">
                        <span><strong id="profile-posts-count">0</strong> 帖子</span>
                        <span><strong id="profile-followers-count">0</strong> 粉丝</span>
                        <span><strong id="profile-following-count">0</strong> 关注</span>
                    </div>
                    <div id="profile-actions" style="margin-top:15px;"></div>
                </div>
                <div class="profile-tabs" style="display:flex;gap:10px;margin:15px 0;border-bottom:1px solid #e0e0e0;padding-bottom:10px;">
                    <button class="profile-tab active" onclick="showProfileTab('posts')">他的帖子</button>
                    <button class="profile-tab" onclick="showProfileTab('favorites')">他的收藏</button>
                </div>
                <div id="profile-posts" style="max-height:300px;overflow-y:auto;"></div>
                <div id="profile-favorites" style="max-height:300px;overflow-y:auto;display:none;"></div>
            </div>
        </div>
    </div>

    <!-- 好友模态框 -->
    <div id="friends-modal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3>好友</h3>
                <span class="close-btn">&times;</span>
            </div>
            <div class="modal-body">
                <div class="friends-tabs">
                    <button class="friends-tab active" onclick="switchFriendsTab('list')">好友列表</button>
                    <button class="friends-tab" onclick="switchFriendsTab('add')">添加好友</button>
                </div>
                
                <!-- 好友列表 -->
                <div id="friends-list" class="friends-content">
                    <div class="form-group" style="margin-bottom: 15px;">
                        <input type="text" id="friend-search" placeholder="搜索好友...">
                    </div>
                    <div id="friends-container"></div>
                </div>
                
                <!-- 添加好友 -->
                <div id="add-friends" class="friends-content" style="display: none;">
                    <div class="form-group">
                        <label>用户名或用户ID</label>
                        <input type="text" id="add-friend-username" placeholder="请输入好友用户名或用户ID">
                    </div>
                    <button id="add-friend-btn" class="auth-btn">添加好友</button>
                </div>
            </div>
        </div>
    </div>

    <main>
        <div class="container">
            <!-- 下拉刷新区域 -->
            <div class="pull-refresh" id="pull-refresh">
                <div class="pull-refresh-spinner"></div>
                <div>下拉刷新</div>
            </div>

            <!-- 发布区域 -->
            <section class="post-section">
                <div class="post-card">
                    <div class="post-header">
                        <h2>分享你的故事</h2>
                    </div>
                    <div class="post-content">
                        <textarea id="post-text" placeholder="在这里写下你的想法...&#10;&#10;💡 小提示：&#10;• 用 #话题 创建话题标签&#10;• 用 @用户名 提及好友"></textarea>
                        <div class="post-actions">
                            <button class="emoji-picker-btn" id="emoji-btn">😊</button>
                            <div class="file-upload">
                                <label for="image-upload" class="upload-btn">
                                    <i class="fas fa-image"></i> 图片
                                </label>
                                <input type="file" id="image-upload" accept="image/*" style="display: none;">
                            </div>
                            <div class="file-upload">
                                <label for="video-upload" class="upload-btn">
                                    <i class="fas fa-video"></i> 视频
                                </label>
                                <input type="file" id="video-upload" accept="video/*" style="display: none;">
                            </div>
                            <div class="file-upload">
                                <button id="voice-record" class="upload-btn">
                                    <i class="fas fa-microphone"></i> 语音
                                </button>
                            </div>
                            <button id="post-button" class="post-btn">发布</button>
                        </div>
                        
                        <!-- 表情选择器 -->
                        <div class="emoji-picker" id="emoji-picker">
                            <div class="emoji-grid">
                                <span class="emoji-item">😀</span><span class="emoji-item">😂</span>
                                <span class="emoji-item">😍</span><span class="emoji-item">🥰</span>
                                <span class="emoji-item">😊</span><span class="emoji-item">😎</span>
                                <span class="emoji-item">🤔</span><span class="emoji-item">😅</span>
                                <span class="emoji-item">😢</span><span class="emoji-item">😭</span>
                                <span class="emoji-item">😤</span><span class="emoji-item">🥺</span>
                                <span class="emoji-item">👍</span><span class="emoji-item">👏</span>
                                <span class="emoji-item">❤️</span><span class="emoji-item">💔</span>
                                <span class="emoji-item">🔥</span><span class="emoji-item">⭐</span>
                                <span class="emoji-item">🎉</span><span class="emoji-item">💪</span>
                                <span class="emoji-item">🙏</span><span class="emoji-item">✨</span>
                                <span class="emoji-item">🌈</span><span class="emoji-item">☀️</span>
                                <span class="emoji-item">🌙</span><span class="emoji-item">🌸</span>
                                <span class="emoji-item">🍀</span><span class="emoji-item">🎁</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 排行榜区域 -->
            <section class="content-section">
                <h2>排行榜</h2>
                <div class="ranking-tabs">
                    <button class="ranking-tab active" onclick="showRanking('likes')">🔥 点赞榜</button>
                    <button class="ranking-tab" onclick="showRanking('views')">👁️ 浏览榜</button>
                    <button class="ranking-tab" onclick="showRanking('comments')">💬 评论榜</button>
                </div>
                <div id="ranking-container" class="posts-grid"></div>
            </section>

            <!-- 内容展示区域 -->
            <section class="content-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>最新分享</h2>
                    <div style="display: flex; gap: 10px;">
                        <button onclick="exportData()" class="upload-btn" style="padding: 8px 15px;">
                            <i class="fas fa-download"></i> 导出
                        </button>
                    </div>
                </div>
                
                <!-- 骨架屏占位 -->
                <div id="skeleton-container" class="posts-grid">
                    <div class="skeleton-card">
                        <div class="skeleton skeleton-avatar"></div>
                        <div class="skeleton skeleton-title"></div>
                        <div class="skeleton skeleton-text"></div>
                        <div class="skeleton skeleton-text"></div>
                    </div>
                    <div class="skeleton-card">
                        <div class="skeleton skeleton-avatar"></div>
                        <div class="skeleton skeleton-title"></div>
                        <div class="skeleton skeleton-text"></div>
                        <div class="skeleton skeleton-text"></div>
                    </div>
                </div>
                
                <div id="posts-container" class="posts-grid"></div>
                
                <!-- 加载更多按钮 -->
                <button class="load-more-btn" id="load-more-btn" style="display: none;">
                    <i class="fas fa-chevron-down"></i> 加载更多
                </button>
            </section>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 心灵树洞 | 在这里，你可以自由表达</p>
            <p style="font-size: 0.8rem; margin-top: 10px; opacity: 0.6;">
                Made with ❤️ by 栖春 The tree hole of the soul | Powered by Supabase
            </p>
        </div>
    </footer>

    <script type="module" src="script.js"></script>
    
    <!-- 夜间模式脚本 -->
    <script>
        // 夜间模式切换
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.documentElement;
        
        // 检查本地存储的主题设置
        const savedTheme = localStorage.getItem('theme') || 'light';
        body.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);
        
        themeToggle.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        });
        
        function updateThemeIcon(theme) {
            const icon = themeToggle.querySelector('i');
            icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }
        
        // 表情选择器
        const emojiBtn = document.getElementById('emoji-btn');
        const emojiPicker = document.getElementById('emoji-picker');
        const postText = document.getElementById('post-text');
        
        emojiBtn.addEventListener('click', () => {
            emojiPicker.classList.toggle('show');
        });
        
        document.querySelectorAll('.emoji-item').forEach(item => {
            item.addEventListener('click', () => {
                postText.value += item.textContent;
                postText.focus();
                emojiPicker.classList.remove('show');
            });
        });
        
        // 点击其他地方关闭表情选择器
        document.addEventListener('click', (e) => {
            if (!emojiPicker.contains(e.target) && e.target !== emojiBtn) {
                emojiPicker.classList.remove('show');
            }
        });
    </script>
</body>
</html>

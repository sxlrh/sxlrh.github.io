<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心灵树洞 - 宣传海报</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .poster {
            width: 800px;
            height: 1200px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
        }
        /* 装饰圆圈 */
        .circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
        }
        .circle1 { width: 400px; height: 400px; background: #667eea; top: -100px; right: -100px; }
        .circle2 { width: 300px; height: 300px; background: #764ba2; bottom: -50px; left: -50px; }
        .circle3 { width: 200px; height: 200px; background: #f093fb; top: 40%; left: -80px; opacity: 0.05; }
        
        /* 主内容区 */
        .content {
            position: relative;
            z-index: 1;
            padding: 60px 40px;
            text-align: center;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        /* Logo */
        .logo {
            font-size: 4rem;
            font-weight: 800;
            color: white;
            margin-bottom: 10px;
            text-shadow: 0 4px 20px rgba(102, 126, 234, 0.5);
        }
        .logo-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 1.5rem;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }
        
        .divider {
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #667eea, transparent);
            margin: 30px auto;
        }
        
        /* 特点列表 */
        .features {
            margin: 40px 0;
        }
        .feature {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            color: white;
            font-size: 1.2rem;
        }
        .feature-icon {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        /* 扫码区域 */
        .cta {
            margin-top: 50px;
        }
        .cta-text {
            color: rgba(255,255,255,0.8);
            font-size: 1.3rem;
            margin-bottom: 20px;
        }
        .qr-section {
            background: linear-gradient(135deg, rgba(102,126,234,0.3) 0%, rgba(118,75,162,0.3) 100%);
            border-radius: 20px;
            padding: 30px;
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .qr-box {
            width: 180px;
            height: 180px;
            background: white;
            border-radius: 15px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        /* 模拟二维码图案 */
        .qr-pattern {
            width: 140px;
            height: 140px;
            position: relative;
        }
        .qr-block {
            position: absolute;
            background: #1a1a2e;
        }
        /* 定位角 */
        .qr-corner {
            width: 30px;
            height: 30px;
            border: 6px solid #1a1a2e;
            position: absolute;
        }
        .qr-corner-tl { top: 0; left: 0; border-right: none; border-bottom: none; }
        .qr-corner-tr { top: 0; right: 0; border-left: none; border-bottom: none; }
        .qr-corner-bl { bottom: 0; left: 0; border-right: none; border-top: none; }
        .qr-corner-br { bottom: 0; right: 0; border-left: none; border-top: none; }
        /* 中心logo */
        .qr-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: #667eea;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .qr-text {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
        }
        
        /* 底部信息 */
        .footer {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
        }
        
        /* 装饰星星 */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="poster">
        <div class="circle circle1"></div>
        <div class="circle circle2"></div>
        <div class="circle circle3"></div>
        
        <div class="stars">
            <div class="star" style="top: 10%; left: 20%; animation-delay: 0s;"></div>
            <div class="star" style="top: 25%; left: 80%; animation-delay: 0.5s;"></div>
            <div class="star" style="top: 45%; left: 15%; animation-delay: 1s;"></div>
            <div class="star" style="top: 60%; left: 85%; animation-delay: 1.5s;"></div>
            <div class="star" style="top: 80%; left: 30%; animation-delay: 0.3s;"></div>
            <div class="star" style="top: 15%; left: 60%; animation-delay: 0.8s;"></div>
            <div class="star" style="top: 70%; left: 70%; animation-delay: 1.2s;"></div>
        </div>
        
        <div class="content">
            <div class="logo-icon">🌳</div>
            <h1 class="logo">心灵树洞</h1>
            <p class="subtitle">在这里，你可以倾诉一切</p>
            
            <div class="divider"></div>
            
            <div class="features">
                <div class="feature">
                    <div class="feature-icon">💬</div>
                    <span>匿名倾诉 · 释放压力</span>
                </div>
                <div class="feature">
                    <div class="feature-icon">🤝</div>
                    <span>结交朋友 · 分享故事</span>
                </div>
                <div class="feature">
                    <div class="feature-icon">❤️</div>
                    <span>温暖社区 · 相互支持</span>
                </div>
                <div class="feature">
                    <div class="feature-icon">🔒</div>
                    <span>隐私保护 · 安全放心</span>
                </div>
            </div>
            
            <div class="divider"></div>
            
            <div class="cta">
                <p class="cta-text">扫码访问</p>
                <div class="qr-section">
                    <div class="qr-box">
                        <div class="qr-pattern">
                            <div class="qr-corner qr-corner-tl"></div>
                            <div class="qr-corner qr-corner-tr"></div>
                            <div class="qr-corner qr-corner-bl"></div>
                            <div class="qr-corner qr-corner-br"></div>
                            <div class="qr-center">🌳</div>
                        </div>
                    </div>
                    <p class="qr-text">sxlrh.github.io</p>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 心灵树洞 | 让每一次倾诉都被温柔以待</p>
        </div>
    </div>
</body>
</html>
